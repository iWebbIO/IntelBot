services:
  gemini-bot:
    build: .
    container_name: gemini-tgbot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./workspace:/workspace
    # No network ports needed — bot uses Telegram polling
    # Resource limits — adjust as needed
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
